---
version: '3.8'

x-airflow-common: &airflow-common
  image: ${AIRFLOW_IMAGE_NAME:-apache/airflow:2.8.1}
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD_ENCODED}@${AIRFLOW_DB_HOST}:${AIRFLOW_DB_PORT}/${AIRFLOW_DB_NAME}
    AIRFLOW__CELERY__BROKER_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD_ENCODED}@${AIRFLOW_DB_HOST}:${AIRFLOW_DB_PORT}/${AIRFLOW_DB_NAME}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    WAREHOUSE_DB_HOST: ${WAREHOUSE_DB_HOST}
    WAREHOUSE_DB_PORT: ${WAREHOUSE_DB_PORT}
    WAREHOUSE_DB_NAME: ${WAREHOUSE_DB_NAME}
    WAREHOUSE_DB_USER: ${WAREHOUSE_DB_USER}
    WAREHOUSE_DB_PASSWORD: ${WAREHOUSE_DB_PASSWORD}
    PIPELINE_BATCH_SIZE: ${PIPELINE_BATCH_SIZE}
    PIPELINE_DATA_PATH: ${PIPELINE_DATA_PATH}
    PIPELINE_REJECT_LOG_ENABLED: ${PIPELINE_REJECT_LOG_ENABLED}
    _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME}
    _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./data:/opt/airflow/data
    - ./scripts:/opt/airflow/scripts
    - ./config:/opt/airflow/config
  depends_on:
    rabbitmq:
      condition: service_healthy

services:

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: datamart_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    container_name: datamart_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install apache-airflow-providers-celery apache-airflow-providers-postgres psycopg2-binary pyarrow -q
        bash /opt/airflow/scripts/init_airflow.sh
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: datamart_airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: datamart_airflow_scheduler
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-worker:
    <<: *airflow-common
    container_name: datamart_airflow_worker
    command: celery worker
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  flower:
    <<: *airflow-common
    container_name: datamart_flower
    command: celery flower
    ports:
      - "5555:5555"
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  product-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: datamart_product_api
    environment:
      DATA_PATH: /app/data
      CATALOG_PATH: /app/catalog.json
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    restart: unless-stopped
